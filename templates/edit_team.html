<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Team | Esports Tournament</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🏆 ESPORTS TOURNAMENT
        </a>

        <div class="d-flex gap-2">

            <a href="/"
               class="btn btn-outline-light btn-sm">
                🏆 Leaderboard
            </a>

            <a href="/dashboard"
               class="btn btn-warning btn-sm">
                📊 Dashboard
            </a>

        </div>

    </div>

</nav>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="main-title">
            ✏ EDIT TEAM
        </h1>

        <p class="subtitle">
            Update Team Information
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg">

                <div class="card-header py-3 text-center">
                    🎮 แก้ไขข้อมูลทีม
                </div>

                <div class="card-body p-4">

                    <form method="POST" enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label">
                                🖼 โลโก้ทีมใหม่
                            </label>

                            <input type="file"
                                   name="team_image"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                🏷 ชื่อทีม
                            </label>

                            <input type="text"
                                   name="team_name"
                                   class="form-control"
                                   value="{{ team.team_name }}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                🎯 จำนวน Kill
                            </label>

                            <input type="number"
                                   name="kills"
                                   class="form-control"
                                   value="{{ team.kills }}"
                                   required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                ⭐ คะแนนรวม
                            </label>

                            <input type="number"
                                   name="points"
                                   class="form-control"
                                   value="{{ team.points }}"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-success btn-lg me-2">
                            💾 SAVE
                        </button>

                        <a href="/"
                           class="btn btn-secondary btn-lg">
                            ↩ BACK
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
