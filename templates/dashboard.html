<!DOCTYPE html>

<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

```
<title>Dashboard | Esports Tournament</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">
```

</head>

<body>

<nav class="navbar navbar-dark shadow">

```
<div class="container">

    <a class="navbar-brand fw-bold" href="/">
        🏆 ESPORTS TOURNAMENT
    </a>

    <div class="d-flex gap-2">

        <a href="/"
           class="btn btn-outline-light btn-sm">
            Leaderboard
        </a>

        <a href="/add"
           class="btn btn-success btn-sm">
            ➕ Add Team
        </a>

    </div>

</div>
```

</nav>

<div class="container">

```
<div class="hero">

    <h1>DASHBOARD</h1>

    <p>Tournament Statistics</p>

</div>

<div class="row g-4">

    <div class="col-md-4">

        <div class="card text-center h-100">

            <div class="card-body">

                <h5>
                    🏆 จำนวนทีมทั้งหมด
                </h5>

                <div class="number">
                    {{ total_teams }}
                </div>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card text-center h-100">

            <div class="card-body">

                <h5>
                    🎯 Kill รวม
                </h5>

                <div class="number">
                    {{ total_kills }}
                </div>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card text-center h-100">

            <div class="card-body">

                <h5>
                    ⭐ คะแนนรวม
                </h5>

                <div class="number">
                    {{ total_points }}
                </div>

            </div>

        </div>

    </div>

</div>

<div class="text-center mt-5">

    <a href="/add"
       class="btn btn-success btn-lg me-2">
        ➕ เพิ่มทีม
    </a>

    <a href="/"
       class="btn btn-warning btn-lg">
        🏆 ตารางคะแนน
    </a>

</div>

<div class="footer">
    ESPORTS TOURNAMENT MANAGEMENT SYSTEM © 2026
</div>
```

</div>

</body>
</html>
