<!DOCTYPE html>

<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Add Team | Tournament</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">


</head>

<body>

<nav class="navbar navbar-dark shadow mb-4">


<div class="container">

    <a class="navbar-brand text-warning fw-bold"
       href="/">
         TOURNAMENT
    </a>

    <div>

        <a href="/"
           class="btn btn-outline-light btn-sm">
            Leaderboard
        </a>

        <a href="/dashboard"
           class="btn btn-outline-warning btn-sm">
            Dashboard
        </a>

    </div>

</div>


</nav>

<div class="container py-5">


<div class="text-center mb-5">

    <h1 class="main-title">
        ADD NEW TEAM
    </h1>

    <p class="subtitle">
        Team Registration System
    </p>

</div>

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-lg">

            <div class="card-header py-3">

                <h3 class="mb-0">
                    ➕ เพิ่มทีมแข่งขัน
                </h3>

            </div>

            <div class="card-body p-4">

                <form method="POST"
                      enctype="multipart/form-data">

                    <div class="mb-3">

                        <label class="form-label">
                            โลโก้ทีม
                        </label>

                        <input type="file"
                               name="team_image"
                               class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            ชื่อทีม
                        </label>

                        <input type="text"
                               name="team_name"
                               class="form-control"
                               placeholder="เช่น Buriram United Esports"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            จำนวน Kill
                        </label>

                        <input type="number"
                               name="kills"
                               class="form-control"
                               placeholder="0"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            คะแนนรวม
                        </label>

                        <input type="number"
                               name="points"
                               class="form-control"
                               placeholder="0"
                               required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            รอบการแข่งขัน
                        </label>

                        <select name="round_name"
                                class="form-select">

                            <option>Round 1</option>
                            <option>Round 2</option>
                            <option>Round 3</option>
                            <option>Semi Final</option>
                            <option>Grand Final</option>

                        </select>

                    </div>

                    <button type="submit"
                            class="btn btn-success btn-lg me-2">

                        💾 บันทึกข้อมูล

                    </button>

                    <a href="/"
                       class="btn btn-secondary btn-lg">

                        ↩ กลับหน้าหลัก

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>


</div>

</body>
</html>
