<!DOCTYPE html>
<html>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<head>
    <title>เพิ่มทีม</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>เพิ่มทีมแข่งขัน</h2>

    <form method="POST">

        <div class="mb-3">
            <label>ชื่อทีม</label>
            <input type="text"
                   name="team_name"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Kill</label>
            <input type="number"
                   name="kills"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>คะแนน</label>
            <input type="number"
                   name="points"
                   class="form-control"
                   required>
        </div>

        <button class="btn btn-success">
            บันทึก
        </button>

    </form>

</div>

</body>
</html>
